<!DOCTYPE html>
<html lang="en">
<head>
	<title>Iniciar Sesión</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!--<link rel="icon" type="image/png" href="img/favicon.ico"/>-->

	<link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
	
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" type="text/css" href="../fonts/font-awesome-4.7.0/css/font-awesome.min.css">

	

	<link rel="stylesheet" type="text/css" href="../css/login.css">
</head>
<body>
	<div class="page">
		<div class="contenido-login">
			<div class="envolver-login">
				<form class="formulario-login">
					<span class="formulario-login-titulo">
						Synergic
					</span>

					<div class="formulario-campos">
						<input class="campos" type="text" name="user" placeholder="Usuario" required>
						<span class="focus-campo"></span>
						<span class="simbolo-campo">
							<span class="fa fa-user lnr lnr-user"></span>
						</span>
					</div>

					<div class="formulario-campos">
						<input class="campos" type="password" name="pass" placeholder="Contraseña" required>
						<span class="focus-campo"></span>
						<span class="simbolo-campo">
							<span class="fa fa-lock lnr lnr-lock"></span>
						</span>
					</div>

					<div class="formulario-campos">
						<input class="campo-checkbox" id="ckb1" type="checkbox" name="remember-me">
						<label class="label-checkbox" for="ckb1">
							Recuérdame
						</label>
					</div>
					
					<div class="contenidod-login-formulario-btn">
						<button class="login-formulario-btn">
							Iniciar Sesión
						</button>
					</div>

					<div class="text-center w-full no-acount">
						<a href="#">
							¿Olvidaste tu contraseña?						
						</a>
					</div>

					<!--<div class="text-center w-full others_sign ">
						<div class="txt1">
							<hr>
							o
							<hr>
						</div>
					</div>-->

					<a href="#" class="btn-face">
						<i class="fa fa-facebook-official"></i>
						Facebook
					</a>

					<a href="#" class="btn-google">
						<img src="../img/icon-google.png" alt="Google">
						Google
					</a>

					<div class="text-center w-full no-acount">
						<span class="txt1">
							¿No tienes una cuenta?
						</span>

						<a class="register" href="#">
							Regístrate						
						</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
