<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <meta name="viewport" content="width=device-width, user-scalable=no,initial-scale=1 ">
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </head>
  <body>

    <div class="container">
      <form class="mt-5">
        <div class="row ">
          <div class="contacto col-xs-12 col-md-4 mb-5 offset-lg-3">
            CONTACTANOS
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-xs-12 col-md-6 col-lg-4 offset-lg-2">
            <label for="inputEmail4">Nombre</label>
            <input type="email" class="form-control" id="inputEmail4">
          </div>
          <div class="form-group col-xs-12 col-md-6 col-lg-4">
            <label for="inputPassword4">Apellido</label>
            <input type="password" class="form-control" id="inputPassword4">
          </div>
        </div>
        <div class="form-row">
          <div class=" col-xs-12 col-md-6 col-lg-4 offset-lg-2">
            <label for="inputEmail4">Teléfono fijo</label>
            <input type="email" class="form-control" id="inputEmail4">
          </div>
          <div class=" col-xs-12 col-md-6 col-lg-4">
            <label for="inputPassword4">Celular</label>
            <input type="password" class="form-control" id="inputPassword4">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-xs-12 col-md-12 col-lg-8 offset-lg-2">
            <label for="">Mensaje</label>
            <textarea class="form-control" rows="6" name="comentario"></textarea>
            <button type="submit" class="btn btn-primary">Enviar</button>
          </div>
        </div>

      </form>

    </div>
  </body>
</html>
